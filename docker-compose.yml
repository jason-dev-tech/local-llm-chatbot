services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/ready', timeout=5).getcode() == 200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    environment:
      OPENAI_BASE_URL: http://host.docker.internal:1234/v1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-local-dev-key}
      MODEL_NAME: ${MODEL_NAME:-local-model}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5}
      DB_PATH: ${DB_PATH:-data/chat_store.db}
      KNOWLEDGE_DIR: ${KNOWLEDGE_DIR:-knowledge}
      CHROMA_PERSIST_DIR: ${CHROMA_PERSIST_DIR:-data/chroma_db}
      CHUNK_SIZE: ${CHUNK_SIZE:-500}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-100}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./knowledge:/app/knowledge
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://127.0.0.1:8001}
    ports:
      - "3000:80"
    depends_on:
      - backend
